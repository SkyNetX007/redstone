# locales/en-US.yaml
app:
    about: "Redstone Control"
    cli:
        action_cancelled: "Cancelled"
        arg_profile: "Profile name"
        connect_err: "Cannot connect to server '%{profile}': %{error}"
        invalid_profile_name: "Invalid name '%{name}': only letters, numbers, '_', and '-' are allowed"
        profile_not_found: "Profile '%{name}' not found"

        start:
            arg_profile: "Profile name or path"
            daemon_load_err: "Failed to load profile: %{error}"
            daemon_run_err: "Daemon error: %{error}"
            desc: "Start the Minecraft server (background)"
            exe_err: "Failed to get executable path: %{error}"
            hint_attach: "   Use 'redstone attach %{name}' for console"
            hint_status: "   Use 'redstone status %{name}' to check status"
            import_err: "Failed to import profile: %{error}"
            imported: "   Profile imported: %{path}"
            load_err: "Failed to load profile '%{profile}': %{error}"
            log_dir_err: "Failed to create log directory: %{error}"
            ok: "✨ Server '%{name}' started"
            start_err: "Failed to start daemon: %{error}"
            daemon_died: "Daemon exited unexpectedly (status %{code}): %{error}"
            already_running: "Server '%{name}' is already running"

        stop:
            arg_timeout: "Max seconds to wait before force-kill [default: 30]"
            arg_wait: "Wait for server to fully stop"
            desc: "Gracefully stop the server"
            ok: "   Server '%{profile}' stopped"
            sending: "   Sending stop to '%{profile}'..."
            timeout: "   Server did not stop within %{timeout}s, forcing kill"
            wait: "   Waiting up to %{timeout}s for graceful stop..."

        kill:
            confirm: "Force kill '%{name}'? (y/N)"
            desc: "Force kill the server"
            ok: "Force killing '%{profile}'..."

        restart:
            desc: "Restart the server"
            stopping: "Stopping '%{profile}'..."

        status:
            desc: "Query server status"
            failed: "  Status:     %{error}"
            header: "📊 [App] Server: %{profile}"
            latency: "  Latency:    %{latency}ms"
            motd: "  MOTD:       %{motd}"
            pid: "  PID:        %{pid}"
            players: "  Players:    %{online}/%{max}"
            running: "  Running:    %{running}"
            unreachable: "  SLP ping: port %{port} unreachable"
            uptime: "  Uptime:     %{uptime}s"
            version: "  Version:    %{version}"

        attach:
            conn_lost: "Connection lost: %{error}"
            daemon_err: "Daemon error: %{msg}"
            desc: "Attach to server console"
            err: "Attach error: %{error}"
            ok: "🔌 [App] Attached to '%{profile}'. Ctrl+Q or Ctrl+C to detach"
            raw_mode_err: "Failed to enable raw mode: %{error}"
            server_exited: "🛑 Server exited with status: %{status}"

        list:
            arg_offline: "Show only offline servers"
            arg_online: "Show only online servers"
            desc: "List all registered servers"
            info_header: "Info"
            name_header: "Name"
            none: "No registered servers"
            offline_label: "⚪ Offline"
            online_label: "🟢 Online"
            status_header: "Status"

        rm:
            arg_force: "Force remove even if running"
            confirm: "Remove '%{name}' and all data? (y/N)"
            delete_err: "Failed to delete %{path}: %{error}"
            desc: "Remove a server profile and data"
            ok: "Removed '%{name}'"
            running: "Server '%{name}' is running. Use --force to remove"

        rename:
            arg_from: "Current profile name"
            arg_to: "New profile name"
            desc: "Rename a profile"
            exists: "Profile '%{name}' already exists"
            ok: "Renamed '%{old}' to '%{new}'"
            running: "Cannot rename running server '%{name}'"

        log:
            arg_follow: "Follow new log entries"
            desc: "View server log"
            err: "Failed to read log: %{error}"
            none: "No log file found for '%{profile}'"

        completion:
            arg_shell: "Shell type"
            desc: "Generate shell completion script"

        init:
            arg_output: "Output path [default: stdout]"
            arg_server_type: "Server type"
            desc: "Create a profile template (minecraft|cmd)"
            ok: "Created profile template at %{path}"
            write_err: "Failed to write to %{path}"

        exec:
            arg_command: "Command to execute"
            desc: "Execute a command on a running server"
            ok: "   Command sent to '%{profile}'"

        config:
            arg_profile: "Profile name (omit for global config)"
            desc: "View or modify configuration"
            empty: "(empty config)"
            key_not_found: "Key '%{key}' not found"
            null_value: "null"
            ok: "Set %{key} = %{value}"
            parse_err: "Failed to parse config: %{error}"
            serialize_err: "Failed to serialize config: %{error}"
            write_err: "Failed to write config: %{error}"
            get:
                arg_key: "Config key (e.g. locale, memory.max)"
                desc: "Get a config value"
            set:
                arg_key: "Config key (e.g. locale, auto_restart)"
                arg_value: "Value to set"
                desc: "Set a config value"

        desktop:
            start: "⚙️ [App] start desktop app"
